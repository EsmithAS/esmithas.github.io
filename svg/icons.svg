<!-- Para agregar un nuevo SVG:
    1. Cambiar <svg> -> <symbol>
    2. Quitar el width y height en caso tenga
    3. Poner un id para luego llamar en html
    4. Verificar que tenga el atributo -> xmlns="http://www.w3.org/2000/svg" 
       (De no tener ponerselo)

    Para llamar SVG en HTML:
    1. usar <svg class="estilos aqui"> <use href="iconos.svg#idSVG" /> </svg>
    2. Los estilo se cambian en el SVG no en el use
    3. Propiedad de css -> fill , cambia color del svg
 -->